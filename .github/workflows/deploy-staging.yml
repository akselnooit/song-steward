name: Deploy — Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: rm -f package-lock.json && npm install

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE: /song-steward/staging/

      - name: Deploy do gh-pages/staging/
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Zachowaj dist w miejscu tymczasowym
          cp -r dist /tmp/staging-dist

          # Przełącz na gh-pages
          git fetch origin gh-pages
          git checkout gh-pages

          # Zastąp tylko podfolder staging/
          rm -rf staging
          cp -r /tmp/staging-dist staging

          # Commituj i pushuj (jeśli są zmiany)
          git add staging/
          git diff --staged --quiet || git commit -m "Deploy staging [skip ci]"
          git push origin gh-pages
