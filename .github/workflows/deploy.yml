name: Deploy — Production (main)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - run: rm -f package-lock.json && npm install

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_BASE: /song-steward/

      - name: Deploy do gh-pages/ (root, zachowaj staging/)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Zachowaj dist w miejscu tymczasowym
          cp -r dist /tmp/prod-dist

          # Przełącz na gh-pages (force — dist już bezpiecznie w /tmp)
          git fetch origin gh-pages
          git checkout -f gh-pages

          # Zachowaj podfolder staging/ jeśli istnieje
          if [ -d staging ]; then
            cp -r staging /tmp/staging-backup
          fi

          # Wyczyść root (bez staging/)
          find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name 'staging' -exec rm -rf {} +

          # Przywróć staging/ jeśli był
          if [ -d /tmp/staging-backup ]; then
            cp -r /tmp/staging-backup staging
          fi

          # Skopiuj produkcję do roota
          cp -r /tmp/prod-dist/. .

          # Commituj i pushuj (jeśli są zmiany)
          git add -A
          git diff --staged --quiet || git commit -m "Deploy production [skip ci]"
          git push origin gh-pages
