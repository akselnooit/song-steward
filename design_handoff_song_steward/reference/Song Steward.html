obie <!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Song Steward — przeprojektowanie</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    html, body { margin: 0; height: 100%; }
    body {
      background:
        radial-gradient(1200px 700px at 78% 12%, #20242b 0%, transparent 60%),
        linear-gradient(180deg, #16181c 0%, #101216 100%);
      font-family: 'Hanken Grotesk', system-ui, sans-serif;
      color: #e7e8ea;
      overflow: hidden;
    }
    .stage { display: flex; height: 100vh; }

    /* ---- design control rail (tool chrome — fixed neutral, not themed) ---- */
    .rail {
      width: 290px; flex-shrink: 0; height: 100%; overflow-y: auto;
      background: rgba(255,255,255,0.025);
      border-right: 1px solid rgba(255,255,255,0.07);
      padding: 26px 22px; box-sizing: border-box;
      display: flex; flex-direction: column; gap: 22px;
    }
    .rail::-webkit-scrollbar { width: 6px; }
    .rail::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 99px; }
    .rail-brand { display: flex; align-items: center; gap: 12px; }
    .rail-logo { width: 40px; height: 40px; border-radius: 12px; background: oklch(0.62 0.08 156); color: #0e1410; display: grid; place-items: center; }
    .rail-title { font-weight: 700; font-size: 15px; letter-spacing: -0.01em; }
    .rail-sub { font-size: 12px; color: rgba(231,232,234,0.5); margin-top: 1px; }

    .rail-group { display: flex; flex-direction: column; gap: 9px; }
    .rail-label { font-size: 11px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: rgba(231,232,234,0.42); }
    .rail-note { font-size: 12px; line-height: 1.45; color: rgba(231,232,234,0.55); margin: 2px 0 0; }

    /* segmented control restyle inside dark rail */
    .rail .seg { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.09); width: 100%; }
    .rail .seg button { flex: 1; color: rgba(231,232,234,0.6); font-family: 'Hanken Grotesk', sans-serif; }
    .rail .seg button.on { background: rgba(255,255,255,0.13); color: #fff; box-shadow: none; }

    .rail-jumps { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .rail-jump {
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      color: rgba(231,232,234,0.78); border-radius: 9px; padding: 9px 8px; cursor: pointer;
      font-family: 'Hanken Grotesk', sans-serif; font-size: 12.5px; font-weight: 600;
    }
    .rail-jump:hover { background: rgba(255,255,255,0.09); color: #fff; }
    .rail-jump:active { transform: scale(0.97); }
    .rail-foot { font-size: 11px; color: rgba(231,232,234,0.32); margin: auto 0 0; }

    /* ---- phone area ---- */
    .phone-wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-width: 0; }

    @media (max-width: 720px) {
      .stage { flex-direction: column; }
      .rail { width: 100%; height: auto; flex-direction: row; flex-wrap: wrap; gap: 16px; align-items: center; padding: 14px 16px; }
      .rail-brand { width: 100%; }
      .rail-group { flex: 1; min-width: 150px; }
      .rail-foot, .rail-note { display: none; }
      .phone-wrap { padding: 12px 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script src="data.js"></script>
  <script type="text/babel" src="frames/ios-frame.jsx"></script>
  <script type="text/babel" src="icons.jsx"></script>
  <script type="text/babel" src="ui.jsx"></script>
  <script type="text/babel" src="overlay.jsx"></script>
  <script type="text/babel" src="screens-core.jsx"></script>
  <script type="text/babel" src="screens-library.jsx"></script>
  <script type="text/babel" src="screens-service.jsx"></script>
  <script type="text/babel" src="screens-admin.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
